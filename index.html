<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GastroFlow</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração Personalizada do Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Custom scrollbar for KDS */
      .kds-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
      .kds-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
      .kds-scroll::-webkit-scrollbar-track { background-color: #f1f5f9; }
    </style>
    
    <!-- Import Map com versões estáveis do React 18 -->
    <script type="importmap">
    {
      "imports": {
        "react-router-dom": "https://esm.sh/react-router-dom@6.22.3",
        "react-router": "https://esm.sh/react-router@6.22.3",
        "@remix-run/router": "https://esm.sh/@remix-run/router@1.15.3",
        "react": "https://esm.sh/react@18.2.0",
        "react/": "https://esm.sh/react@18.2.0/",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/": "https://esm.sh/react-dom@18.2.0/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "recharts": "https://esm.sh/recharts@2.12.2"
      }
    }
    </script>
  </head>
  <body class="bg-gray-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
