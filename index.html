
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#22c55e" />
    
    <!-- Configurações para iOS (Ocultar barra de endereços/links) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flux Eat" />
    
    <title>Flux Eat</title>
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1996/1996068.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração Personalizada do Tailwind -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      /* Configuração para App Nativo (PWA) */
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Impede o scroll da janela do navegador */
        overscroll-behavior: none; /* Desativa o efeito elástico do iOS/Android */
        -webkit-tap-highlight-color: transparent;
        background-color: #f9fafb;
      }

      body { 
        font-family: 'Inter', sans-serif;
      }

      #root {
        height: 100%;
        width: 100%;
        overflow: hidden; 
        display: flex;
        flex-direction: column;
        
        /* Ajuste para Window Controls Overlay (Desktop PWA) */
        padding-top: env(titlebar-area-height, 0px); 
      }

      /* Custom scrollbar for KDS */
      .kds-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
      .kds-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
      .kds-scroll::-webkit-scrollbar-track { background-color: #f1f5f9; }
      
      /* Safe area variables for PWA */
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
        padding-bottom: constant(safe-area-inset-bottom);
      }
      
      .safe-area-top {
        padding-top: env(safe-area-inset-top);
        padding-top: constant(safe-area-inset-top);
      }

      /* Área de arraste para PWA Desktop (Permite mover a janela clicando no topo) */
      .app-drag-region {
        -webkit-app-region: drag;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(titlebar-area-height, 30px);
        z-index: 9999;
        pointer-events: none; /* Permite clicar nos botões se houver */
      }

      /* CORREÇÃO DE IMPRESSÃO PARA PWA */
      @media print {
        html, body, #root {
          height: auto !important;
          overflow: visible !important;
          background-color: white !important;
          padding-top: 0 !important;
        }
        
        /* Esconde elementos de UI durante a impressão */
        nav, header, button, .no-print, .app-drag-region {
          display: none !important;
        }
        
        /* Garante que o conteúdo de impressão ocupe 100% */
        .print-content {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          position: absolute;
          top: 0;
          left: 0;
          z-index: 9999;
          background: white;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body class="bg-gray-50 text-slate-900">
    <!-- Região de arraste invisível para Desktop PWA -->
    <div class="app-drag-region"></div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
